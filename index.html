<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DiskCleanMaster Pages</title>
    <meta http-equiv="refresh" content="0; url=https://shemliang.github.io/DiskCleanMaster/privacy-policy.html">
    <style>
        :root {
            color-scheme: light dark;
            --bg: #ffffff;
            --panel: #f7f7f8;
            --text: #1f2328;
            --muted: #59636e;
            --border: #d0d7de;
            --link: #0969da;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0d1117;
                --panel: #161b22;
                --text: #e6edf3;
                --muted: #9da7b3;
                --border: #30363d;
                --link: #58a6ff;
            }
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--text);
            font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            padding: 24px;
        }

        main {
            max-width: 720px;
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 1.8rem;
        }

        p {
            margin: 0 0 16px;
        }

        a {
            color: var(--link);
        }
    </style>
</head>
<body>
<main>
    <h1>DiskCleanMaster Pages</h1>
    <p>Redirecting to the published Privacy Policy page.</p>
    <p>If you are not redirected automatically, open <a href="https://shemliang.github.io/DiskCleanMaster/privacy-policy.html">Privacy Policy</a>.</p>
</main>
</body>
</html>
